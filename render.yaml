services:
  - type: web
    name: can-we-update-mc
    env: python
    region: oregon
    buildCommand: pip install uv && uv sync --frozen
    startCommand: python -m bot.main
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: config
      mountPath: /app
      sizeGB: 1
      hostPath: ""
    autoDeploy: true
