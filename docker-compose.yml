version: "3.8"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./mods.txt:/app/mods.txt:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('https://api.modrinth.com/v2/tag/game_version')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Production deployment using --remote-only
  deploy:
    image: can-we-update-mc:latest
    env_file:
      - .env
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./mods.txt:/app/mods.txt:ro
    restart: unless-stopped
    profiles:
      - deploy
    labels:
      - "traefik.enable=false"
