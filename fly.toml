app = "can-we-update-mc"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[http_service]
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 256

[env]
  PYTHONUNBUFFERED = "1"

[metadata]
  # Configure secrets via: fly secrets set DISCORD_TOKEN=xxx
